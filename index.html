<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIテレサポ ツールポータル</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0e1a;--sf:#111827;--s2:#1a2234;--bd:rgba(255,255,255,.08);
  --ac:#4f7cff;--gr:#22c57a;--tx:#e2e8f0;--mu:#64748b;--mu2:#94a3b8;
  --sans:'Noto Sans JP',sans-serif;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--tx);font-family:var(--sans)}

/* ── TOP NAV ── */
.nav{
  height:52px;background:var(--sf);border-bottom:1px solid var(--bd);
  display:flex;align-items:center;padding:0 20px;gap:0;position:relative;z-index:10;
  flex-shrink:0;
}
.nav-logo{
  display:flex;align-items:center;gap:8px;
  font-size:13px;font-weight:900;color:var(--tx);
  margin-right:20px;flex-shrink:0;
}
.nav-pip{width:8px;height:8px;border-radius:50%;background:var(--ac);flex-shrink:0}

.tab-list{display:flex;gap:2px;flex:1;overflow-x:auto;scrollbar-width:none}
.tab-list::-webkit-scrollbar{display:none}

.tab{
  display:flex;align-items:center;gap:7px;
  padding:0 18px;height:52px;
  border:none;background:none;cursor:pointer;
  color:var(--mu2);font-size:13px;font-weight:700;
  font-family:var(--sans);white-space:nowrap;
  border-bottom:2px solid transparent;
  transition:color .15s,border-color .15s;
  flex-shrink:0;
}
.tab:hover{color:var(--tx)}
.tab.active{color:var(--tx);border-bottom-color:var(--ac)}
.tab-icon{font-size:16px;line-height:1}
.tab-badge{
  font-size:9px;font-family:'JetBrains Mono',monospace;font-weight:700;
  padding:2px 6px;border-radius:4px;
  background:var(--s2);color:var(--mu2);
  border:1px solid var(--bd);
}
.tab.active .tab-badge{background:rgba(79,124,255,.2);color:#93b4ff;border-color:rgba(79,124,255,.3)}

/* ── FRAMES ── */
.frame-wrap{height:calc(100vh - 52px);position:relative}
.frame{
  position:absolute;inset:0;
  width:100%;height:100%;
  border:none;display:none;
}
.frame.active{display:block}

/* ── LOADING ── */
.loading{
  position:absolute;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:var(--bg);gap:14px;font-size:13px;color:var(--mu2);
  transition:opacity .3s;
}
.loading.hidden{opacity:0;pointer-events:none}
.spin{
  width:32px;height:32px;border-radius:50%;
  border:3px solid var(--bd);border-top-color:var(--ac);
  animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* mobile */
@media(max-width:600px){
  .nav-logo span{display:none}
  .tab{padding:0 12px;font-size:11px;gap:5px}
  .tab-badge{display:none}
}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-logo">
    <div class="nav-pip"></div>
    <span>AIテレサポ</span>
  </div>

  <div class="tab-list">
    <button class="tab active" onclick="switchTab('recorder',this)">
      <span class="tab-icon">🎙️</span>
      録音アプリ
      <span class="tab-badge">RECORDER</span>
    </button>
    <button class="tab" onclick="switchTab('checklist',this)">
      <span class="tab-icon">✅</span>
      録音チェックリスト
      <span class="tab-badge">CHECKLIST</span>
    </button>
    <button class="tab" onclick="switchTab('playbook',this)">
      <span class="tab-icon">📖</span>
      プレイブック
      <span class="tab-badge">PLAYBOOK</span>
    </button>
  </div>
</nav>

<div class="frame-wrap">
  <!-- 録音アプリ -->
  <div class="loading" id="load-recorder">
    <div class="spin"></div>
    <div>録音アプリを読み込み中...</div>
  </div>
  <iframe class="frame active" id="frame-recorder"
    src="recorder.html"
    onload="onLoad('recorder')"></iframe>

  <!-- チェックリスト -->
  <div class="loading hidden" id="load-checklist">
    <div class="spin"></div>
    <div>チェックリストを読み込み中...</div>
  </div>
  <iframe class="frame" id="frame-checklist"
    src="checklist.html"
    onload="onLoad('checklist')"></iframe>

  <!-- プレイブック -->
  <div class="loading hidden" id="load-playbook">
    <div class="spin"></div>
    <div>プレイブックを読み込み中...</div>
  </div>
  <iframe class="frame" id="frame-playbook"
    src="playbook.html"
    onload="onLoad('playbook')"></iframe>
</div>

<script>
let cur = 'recorder';

function switchTab(id, btn) {
  // hide current
  document.getElementById('frame-' + cur)?.classList.remove('active');
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));

  cur = id;

  // show new
  document.getElementById('frame-' + id)?.classList.add('active');
  btn.classList.add('active');

  // show loading if not yet loaded
  const load = document.getElementById('load-' + id);
  if (load && !load.classList.contains('hidden')) {
    load.classList.remove('hidden');
  }
}

function onLoad(id) {
  const load = document.getElementById('load-' + id);
  if (load) load.classList.add('hidden');
}
</script>
</body>
</html>
