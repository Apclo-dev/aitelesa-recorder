<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>録音作業チェックリスト — AIテレサポ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0c0f1a;--sf:#141826;--s2:#1c2233;--s3:#232b40;
  --bd:rgba(255,255,255,.07);--bd2:rgba(255,255,255,.13);
  --ac:#4f7cff;--gr:#22c57a;--or:#f97316;--yw:#f59e0b;--rd:#ef4444;--pu:#a855f7;
  --tx:#e4e8f0;--mu:#5a6480;--mu2:#8892aa;
  --d0:#a78bfa;--d1:#60a5fa;--d2:#34d399;--d3:#fbbf24;
  --mono:'JetBrains Mono',monospace;--sans:'Noto Sans JP',sans-serif;
}
body{background:var(--bg);color:var(--tx);font-family:var(--sans);min-height:100vh}

/* ── HEADER ── */
.hd{background:var(--sf);border-bottom:1px solid var(--bd);padding:0 20px;
  position:sticky;top:0;z-index:200;display:flex;align-items:center;height:52px;gap:10px}
.hd-logo{display:flex;align-items:center;gap:7px;font-weight:900;font-size:13px;flex-shrink:0}
.pip{width:7px;height:7px;border-radius:50%;background:var(--ac)}
.hd-dept{background:var(--s2);border:1px solid var(--bd2);border-radius:7px;
  padding:5px 10px;color:var(--tx);font-family:var(--sans);font-size:12px;
  outline:none;cursor:pointer;flex:1;max-width:220px}
.hd-dept:focus{border-color:var(--ac)}
.hd-r{display:flex;gap:5px;margin-left:auto}
.btn{padding:5px 12px;border-radius:7px;font-size:11px;font-weight:700;
  font-family:var(--sans);cursor:pointer;border:1px solid var(--bd2);
  background:var(--s2);color:var(--mu2);transition:all .15s;white-space:nowrap}
.btn:hover{color:var(--tx);border-color:var(--ac)}
.btn.ac{background:var(--ac);border-color:var(--ac);color:#fff}.btn.ac:hover{opacity:.88}
.btn.gr{background:rgba(34,197,122,.15);border-color:rgba(34,197,122,.3);color:var(--gr)}.btn.gr:hover{background:var(--gr);color:#000}
.btn.rd{background:rgba(239,68,68,.12);border-color:rgba(239,68,68,.25);color:#f87171}.btn.rd:hover{background:var(--rd);color:#fff}
.btn.pu{background:rgba(168,85,247,.15);border-color:rgba(168,85,247,.3);color:#c084fc}.btn.pu:hover{background:var(--pu);color:#fff}

/* ── SYNC ── */
.sb{background:var(--s2);border-bottom:1px solid var(--bd);
  padding:4px 20px;display:flex;align-items:center;gap:7px;font-size:10px}
.sd{width:5px;height:5px;border-radius:50%;background:var(--mu);flex-shrink:0;transition:background .3s}
.sd.ok{background:var(--gr);box-shadow:0 0 4px rgba(34,197,122,.6)}
.sd.sy{background:var(--yw);animation:p1 1s infinite}
.sd.er{background:var(--rd)}
@keyframes p1{0%,100%{opacity:1}50%{opacity:.3}}
.st{color:var(--mu2)}.sm{color:var(--mu);font-family:var(--mono);margin-left:auto}

/* ── LAYOUT ── */
.layout{display:grid;grid-template-columns:260px 1fr;height:calc(100vh - 76px)}

/* ── SIDEBAR ── */
.sidebar{background:var(--sf);border-right:1px solid var(--bd);
  display:flex;flex-direction:column;overflow:hidden}
.sb-head{padding:14px 14px 10px;border-bottom:1px solid var(--bd)}
.sb-stats{display:flex;gap:6px;margin-bottom:10px}
.sstat{flex:1;background:var(--s2);border:1px solid var(--bd);border-radius:8px;
  padding:7px;text-align:center}
.sstat-n{font-size:18px;font-weight:900;font-family:var(--mono);line-height:1}
.sstat-l{font-size:9px;color:var(--mu2);margin-top:1px}
.sn-ac{color:var(--ac)}.sn-gr{color:var(--gr)}.sn-or{color:var(--or)}
.prog-t{height:4px;background:var(--s3);border-radius:2px;overflow:hidden;margin-bottom:4px}
.prog-f{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--ac),var(--gr));transition:width .4s}
.prog-l{font-size:10px;color:var(--mu2);font-family:var(--mono);text-align:right}

/* tree */
.tree-wrap{flex:1;overflow-y:auto;padding:6px 0}
.tree-wrap::-webkit-scrollbar{width:3px}
.tree-wrap::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px}
.tn{position:relative}
.tn-row{display:flex;align-items:center;gap:5px;padding:5px 10px;
  border-radius:7px;margin:1px 6px;cursor:pointer;transition:background .12s;min-width:0}
.tn-row:hover{background:rgba(255,255,255,.04)}
.tn.sel>.tn-row{background:rgba(79,124,255,.18)}
.tn-chev{font-size:8px;color:var(--mu);transition:transform .2s;flex-shrink:0;width:10px}
.tn.open>.tn-row .tn-chev{transform:rotate(90deg)}
.tn-icon{font-size:12px;flex-shrink:0}
.d0>.tn-row .tn-icon{color:var(--d0)}
.d1>.tn-row .tn-icon{color:var(--d1)}
.d2>.tn-row .tn-icon{color:var(--d2)}
.d3>.tn-row .tn-icon{color:var(--d3)}
.tn-lbl{font-size:11px;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tn-cnt{font-size:9px;font-family:var(--mono);color:var(--mu);background:var(--s2);
  padding:1px 5px;border-radius:3px;flex-shrink:0}
.tn-done{font-size:9px;font-family:var(--mono);color:var(--gr);flex-shrink:0}
.tn-add{opacity:0;background:none;border:none;cursor:pointer;color:var(--mu);
  font-size:11px;padding:2px 3px;border-radius:3px;flex-shrink:0}
.tn-row:hover .tn-add{opacity:1}
.tn-add:hover{background:rgba(79,124,255,.2);color:var(--ac)}
.tn-children{padding-left:14px}
.tn-children.hid{display:none}
.sb-foot{padding:10px 12px;border-top:1px solid var(--bd)}
.btn-nw{width:100%;padding:8px;background:rgba(79,124,255,.12);
  border:1px solid rgba(79,124,255,.3);border-radius:8px;color:#93b4ff;
  font-size:12px;font-weight:700;font-family:var(--sans);cursor:pointer}
.btn-nw:hover{background:var(--ac);color:#fff}

/* ── MAIN ── */
.main{display:flex;flex-direction:column;overflow:hidden}
.bc{padding:10px 20px;border-bottom:1px solid var(--bd);background:var(--sf);
  display:flex;align-items:center;gap:5px;font-size:11px;color:var(--mu);flex-wrap:wrap}
.bc-sep{color:var(--bd2)}
.bc-i{cursor:pointer;color:var(--mu2)}.bc-i:hover{color:var(--tx)}
.bc-i.cur{color:var(--tx);font-weight:700;cursor:default}
.main-body{flex:1;overflow-y:auto;padding:20px}

/* welcome */
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100%;text-align:center;color:var(--mu)}
.welcome-ic{font-size:38px;margin-bottom:12px;opacity:.4}

/* ── NODE HEADER ── */
.nhd{display:flex;align-items:flex-start;justify-content:space-between;
  margin-bottom:16px;flex-wrap:wrap;gap:10px}
.nhd-l{display:flex;align-items:center;gap:10px}
.ntype{font-size:10px;font-family:var(--mono);font-weight:700;padding:2px 8px;border-radius:4px}
.nt0{background:rgba(167,139,250,.2);color:#c4b5fd;border:1px solid rgba(167,139,250,.3)}
.nt1{background:rgba(96,165,250,.18);color:#93c5fd;border:1px solid rgba(96,165,250,.3)}
.nt2{background:rgba(52,211,153,.15);color:#6ee7b7;border:1px solid rgba(52,211,153,.25)}
.nt3{background:rgba(251,191,36,.15);color:#fde68a;border:1px solid rgba(251,191,36,.25)}
.ntit{font-size:16px;font-weight:900}
.nsub{font-size:11px;color:var(--mu2);margin-top:1px}

/* ── CHILDREN GRID ── */
.ch-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:9px;margin-bottom:20px}
.ch-card{background:var(--s2);border:1px solid var(--bd);border-radius:12px;
  padding:13px 11px;cursor:pointer;transition:all .18s}
.ch-card:hover{border-color:rgba(79,124,255,.35);background:rgba(79,124,255,.08)}
.ch-card.add{border-style:dashed;color:var(--mu);justify-content:center;align-items:center;text-align:center;display:flex;flex-direction:column;gap:4px}
.ch-card.add:hover{color:var(--ac);border-color:var(--ac)}
.ch-ic{font-size:18px;margin-bottom:5px}
.ch-name{font-size:12px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ch-prog{margin-top:5px}
.ch-prog-t{height:3px;background:var(--s3);border-radius:2px;overflow:hidden}
.ch-prog-f{height:100%;background:var(--gr);border-radius:2px;transition:width .3s}
.ch-cnt{font-size:9px;color:var(--mu2);font-family:var(--mono);margin-top:2px}

/* ── RECORDING ITEMS ── */
.rec-list{display:flex;flex-direction:column;gap:6px}
.ri{background:var(--sf);border:1px solid var(--bd);border-radius:11px;overflow:hidden;transition:border-color .15s}
.ri.dn{border-color:rgba(34,197,122,.3);background:rgba(34,197,122,.04)}
.ri.dn .ri-name{text-decoration:line-through;color:var(--mu)}
.ri-main{display:flex;align-items:center;gap:8px;padding:10px 12px;cursor:pointer;user-select:none}
.cbx{width:20px;height:20px;border-radius:6px;border:2px solid var(--bd2);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  transition:all .15s;background:var(--s2)}
.ri.dn .cbx{background:var(--gr);border-color:var(--gr)}
.ckm{font-size:10px;color:#fff;display:none;font-weight:900}
.ri.dn .ckm{display:block}
.ri-body{flex:1;min-width:0}
.ri-name{font-size:13px;font-weight:700}
.ri-path{font-size:10px;color:var(--mu2);font-family:var(--mono);margin-top:1px}
.ri-r{display:flex;align-items:center;gap:5px;flex-shrink:0}
.mt{font-size:9px;font-family:var(--mono);padding:2px 6px;border-radius:3px;
  background:var(--s3);color:var(--mu2);border:1px solid var(--bd)}
.mt.un{color:#94a3b8}.mt.st{color:var(--yw);background:rgba(245,158,11,.1);border-color:rgba(245,158,11,.2)}
.stmp{font-size:10px;font-family:var(--mono);color:var(--gr);
  background:rgba(34,197,122,.1);padding:2px 8px;border-radius:5px;display:none}
.ri.dn .stmp{display:block}
.exb{background:none;border:none;cursor:pointer;padding:0 8px 0 0;
  color:var(--mu);font-size:9px;transition:transform .2s;flex-shrink:0}
.ri.ex .exb{transform:rotate(180deg)}
.ri-det{display:none;padding:0 12px 12px;border-top:1px solid var(--bd);background:var(--s2)}
.ri.ex .ri-det{display:block;padding-top:10px}
.dg{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:8px}
.df label{display:block;font-size:10px;color:var(--mu2);font-family:var(--mono);margin-bottom:3px}
.di{width:100%;padding:6px 10px;background:var(--s3);border:1px solid var(--bd);
  border-radius:7px;color:var(--tx);font-family:var(--sans);font-size:12px;outline:none}
.di:focus{border-color:var(--ac)}
.di::placeholder{color:var(--mu)}
textarea.di{resize:vertical;min-height:46px}
.da{display:flex;gap:6px;margin-top:7px}
.bsv{padding:6px 14px;border-radius:7px;background:var(--ac);border:none;
  color:#fff;font-size:11px;font-weight:700;font-family:var(--sans);cursor:pointer}
.bsv:hover{opacity:.88}
.bcl{padding:6px 10px;border-radius:7px;background:var(--s3);border:1px solid var(--bd);
  color:var(--mu2);font-size:11px;font-weight:700;font-family:var(--sans);cursor:pointer}
.bcl:hover{border-color:var(--rd);color:var(--rd)}

/* ── LOG ── */
.lsec{margin-top:24px}
.lhd{font-size:11px;font-weight:700;color:var(--mu2);margin-bottom:8px}
.llist{display:flex;flex-direction:column;gap:4px;max-height:220px;overflow-y:auto}
.li{background:var(--sf);border:1px solid var(--bd);border-radius:8px;
  padding:7px 12px;display:flex;align-items:flex-start;gap:8px;flex-wrap:wrap}
.lts{font-size:9px;font-family:var(--mono);color:var(--mu);flex-shrink:0;margin-top:1px}
.lb{flex:1;font-size:11px;color:var(--mu2)}
.ln{font-weight:700;color:var(--tx)}
.ldp{font-size:9px;font-family:var(--mono);color:var(--mu);background:var(--s3);padding:1px 5px;border-radius:3px}
.le{font-size:12px;color:var(--mu);text-align:center;padding:14px 0}

/* ── MODAL ── */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(4px);
  z-index:300;display:flex;align-items:center;justify-content:center;padding:16px}
.ov.hid{display:none}
.mo{background:var(--sf);border:1px solid var(--bd2);border-radius:16px;
  width:100%;max-width:640px;max-height:88vh;overflow-y:auto;padding:22px}
.mot{font-size:16px;font-weight:900;margin-bottom:3px}
.mos{font-size:11px;color:var(--mu2);margin-bottom:14px}
.atabs{display:flex;gap:5px;margin-bottom:14px;flex-wrap:wrap}
.at{padding:5px 12px;border-radius:7px;border:1px solid var(--bd);
  background:var(--s2);color:var(--mu2);font-size:11px;font-weight:700;font-family:var(--sans);cursor:pointer}
.at.on{background:var(--ac);border-color:var(--ac);color:#fff}
.as{display:none}.as.on{display:block}
.ml{display:flex;flex-direction:column;gap:6px;margin-bottom:10px}
.mrow{display:flex;align-items:center;gap:6px;background:var(--s2);
  border:1px solid var(--bd);border-radius:8px;padding:8px 10px}
.mi{flex:1;background:var(--s3);border:1px solid var(--bd);border-radius:6px;
  padding:5px 8px;color:var(--tx);font-family:var(--sans);font-size:12px;outline:none}
.mi:focus{border-color:var(--ac)}
.mc{width:28px;height:28px;border-radius:5px;border:1px solid var(--bd);cursor:pointer;padding:0}
.ar{display:flex;gap:6px;margin-top:4px}
.ai{flex:1;background:var(--s2);border:1px solid var(--bd);border-radius:7px;
  padding:6px 10px;color:var(--tx);font-family:var(--sans);font-size:12px;outline:none}
.ai:focus{border-color:var(--ac)}

/* node editor */
.ne-tree{max-height:320px;overflow-y:auto;display:flex;flex-direction:column;gap:4px}
.ne-node{background:var(--s2);border:1px solid var(--bd);border-radius:8px;padding:8px 10px}
.ne-hd{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.ne-ic{font-size:12px}
.ne-ni{flex:1;background:var(--s3);border:1px solid var(--bd);border-radius:5px;
  padding:4px 8px;color:var(--tx);font-family:var(--sans);font-size:12px;outline:none}
.ne-ni:focus{border-color:var(--ac)}
.ne-tag{width:80px;background:var(--s3);border:1px solid var(--bd);border-radius:5px;
  padding:4px 7px;color:var(--tx);font-family:var(--sans);font-size:11px;outline:none}
.ne-tag:focus{border-color:var(--ac)}
.ne-sub{width:100%;background:var(--s3);border:1px solid var(--bd);border-radius:5px;
  padding:4px 8px;color:var(--tx);font-family:var(--sans);font-size:11px;outline:none;margin-bottom:4px}
.ne-sub:focus{border-color:var(--ac)}
.ne-children{padding-left:14px;display:flex;flex-direction:column;gap:3px}
.mf{display:flex;gap:6px;justify-content:flex-end;margin-top:16px;flex-wrap:wrap}
.impa{width:100%;min-height:90px;background:var(--s2);border:1px solid var(--bd);
  border-radius:7px;padding:8px 12px;color:var(--tx);font-family:var(--mono);
  font-size:11px;outline:none;resize:vertical;margin-top:6px}
.impa:focus{border-color:var(--ac)}

/* toast */
.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(10px);
  background:var(--sf);border:1px solid var(--bd);padding:7px 14px;border-radius:8px;
  font-size:11px;opacity:0;transition:all .3s;pointer-events:none;z-index:400;
  white-space:nowrap;box-shadow:0 6px 20px rgba(0,0,0,.5)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.ok{border-color:rgba(34,197,122,.4);color:var(--gr)}
.toast.info{border-color:rgba(79,124,255,.4);color:#93b4ff}
.toast.err{border-color:rgba(239,68,68,.4);color:#fca5a5}

@media(max-width:640px){
  .layout{grid-template-columns:1fr}
  .sidebar{display:none}
  .dg{grid-template-columns:1fr}
}
@media print{
  .hd,.sb,.hd-r,.da,.exb,.ri-det,.lsec,.ov,.sidebar,.bc{display:none!important}
  .layout{grid-template-columns:1fr}
  .main-body{overflow:visible}
  .ri{border:1px solid #ddd;background:#fff;border-radius:6px;margin-bottom:4px}
  .ri.dn{background:#f0fdf4}.stmp{display:block!important}
  body{background:#fff;color:#111}
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="hd">
  <div class="hd-logo"><div class="pip"></div>AIテレサポ 録音チェックリスト</div>
  <select class="hd-dept" id="deptSel" onchange="onDept()">
    <option value="">-- 部署を選択 --</option>
  </select>
  <div class="hd-r">
    <button class="btn pu" onclick="openAdmin()">⚙️ 管理</button>
    <button class="btn" onclick="openImport()">📥 入力</button>
    <button class="btn" onclick="exportData()">📤 出力</button>
    <button class="btn ac" onclick="window.print()">🖨️ PDF</button>
  </div>
</header>

<!-- SYNC BAR -->
<div class="sb">
  <div class="sd" id="sdot"></div>
  <span class="st" id="stxt">初期化中...</span>
  <span class="sm" id="stime"></span>
</div>

<!-- LAYOUT -->
<div class="layout">

  <!-- SIDEBAR: ツリーナビ -->
  <aside class="sidebar">
    <div class="sb-head">
      <div class="sb-stats">
        <div class="sstat"><div class="sstat-n sn-gr" id="sDn">—</div><div class="sstat-l">完了</div></div>
        <div class="sstat"><div class="sstat-n sn-ac" id="sTt">—</div><div class="sstat-l">全件</div></div>
        <div class="sstat"><div class="sstat-n sn-or" id="sRm">—</div><div class="sstat-l">残件</div></div>
      </div>
      <div class="prog-t"><div class="prog-f" id="pf" style="width:0%"></div></div>
      <div class="prog-l" id="pp">—</div>
    </div>
    <div class="tree-wrap" id="treeWrap"></div>
    <div class="sb-foot">
      <button class="btn-nw" onclick="openModal('ws')">＋ ワークスペースを追加</button>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main">
    <div class="bc" id="breadcrumb">
      <span class="bc-i cur">ホーム</span>
    </div>
    <div class="main-body" id="mainBody">
      <div class="welcome">
        <div class="welcome-ic">🗂️</div>
        <div style="font-size:14px;font-weight:700;margin-bottom:6px">部署・ワークスペースを選択してください</div>
        <div style="font-size:12px;color:var(--mu2)">左サイドバーのツリーから選択すると<br>録音対象ファイル一覧が表示されます</div>
      </div>
    </div>
  </div>
</div>

<!-- ADMIN MODAL -->
<div class="ov hid" id="adminModal">
  <div class="mo">
    <div class="mot">⚙️ 管理者設定</div>
    <div class="mos">部署・ノードツリーのカスタマイズ。変更はクラウド共有されます。</div>
    <div class="atabs">
      <button class="at on" onclick="swAT('dept',this)">🏢 部署管理</button>
      <button class="at" onclick="swAT('node',this)">🌲 ノード編集</button>
    </div>
    <div class="as on" id="as-dept">
      <div class="ml" id="adList"></div>
      <div class="ar">
        <input class="ai" id="ndn" placeholder="新しい部署名（例: 営業部 Bチーム）">
        <button class="btn ac" onclick="addDept()">＋ 追加</button>
      </div>
    </div>
    <div class="as" id="as-node">
      <select class="hd-dept" id="ndeptSel" onchange="renderNodeAdmin()" style="margin-bottom:10px;width:100%"></select>
      <div class="ne-tree" id="neTree"></div>
    </div>
    <div class="mf">
      <button class="btn rd" onclick="resetDept()">チェック記録をリセット</button>
      <button class="btn" onclick="closeAdmin()">キャンセル</button>
      <button class="btn ac" onclick="saveAdmin()">💾 保存して閉じる</button>
    </div>
  </div>
</div>

<!-- MODAL (ws/node add) -->
<div class="ov hid" id="addModal">
  <div class="mo" style="max-width:420px">
    <div class="mot" id="addMot">追加</div>
    <div class="mos" id="addMos">名前を入力してください</div>

<script>
// ════════════════════════════════════════════════════════
//  STORAGE

const CLOUD=typeof window.storage!=='undefined';
async function cg(k){
  if(CLOUD){try{const r=await window.storage.get(k,true);return r?JSON.parse(r.value):null}catch{return null}}
  try{return JSON.parse(localStorage.getItem(k))}catch{return null}
}
async function cs(k,v){
  const s=JSON.stringify(v);
  if(CLOUD){try{await window.storage.set(k,s,true)}catch(e){console.warn(e)}}
  localStorage.setItem(k,s);
}

// ════════════════════════════════════════════════════════

//  checks: { nodeId: {done, doneAt, person, memo} }
//  logs:   [{ts, action, name, dept, deptName, person}]
// ════════════════════════════════════════════════════════

const LABELS={ws:'ワークスペース',talk:'トーク',var:'バリエーション',rebuttal:'切り返し'};

const DEPTH_CLASS={ws:'d0',talk:'d1',var:'d2',rebuttal:'d3'};

// ── デフォルトデータ（アプクロ用） ──
const DD=[{id:'d0',name:'アプクロ（AIテレサポ担当）',color:'#4f7cff'}];
const DN={

        {id:'ws1_t1_v1',type:'var',name:'説明3 — 保留音60秒結合',

// ════════════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════════════
let depts=[],nodes={},checks={},logs=[];
let curDept=null,selNodeId=null;
const expanded={};

// ════════════════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════════════════
async function init(){
  setSS('sy','同期中...');
  try{
    const [d,n,c,l]=await Promise.all([cg('rc3_d'),cg('rc3_n'),cg('rc3_c'),cg('rc3_l')]);
    depts=d||DD; nodes=n||DN; checks=c||{}; logs=l||[];
    setSS('ok',CLOUD?'クラウド同期: 接続済み（複数人でリアルタイム共有）':'ローカル保存モード');
  }catch{
    depts=DD;nodes=DN;checks={};logs=[];
    setSS('er','同期エラー — ローカルモード');
  }
  buildDS();
  const last=localStorage.getItem('rc3_ld');
  if(last&&depts.find(d=>d.id===last)){
    document.getElementById('deptSel').value=last;
    curDept=last; renderSidebar();
  }
}

async function push(){
  setSS('sy','保存中...');
  try{
    await Promise.all([cs('rc3_d',depts),cs('rc3_n',nodes),cs('rc3_c',checks),cs('rc3_l',logs.slice(-400))]);
    setSS('ok',CLOUD?'クラウド同期: 保存完了':'ローカル保存完了');
    document.getElementById('stime').textContent='更新: '+fmtNow();
  }catch(e){setSS('er','保存エラー: '+e.message)}
}
function setSS(s,t){document.getElementById('sdot').className='sd '+s;document.getElementById('stxt').textContent=t;}

// ════════════════════════════════════════════════════════
//  TREE HELPERS (flat walk)
// ════════════════════════════════════════════════════════
function walkAll(deptId,cb){(nodes[deptId]||[]).forEach(n=>walk(n,cb));}
function walk(node,cb){cb(node);(node.children||[]).forEach(c=>walk(c,cb));}
function findNode(deptId,id){let f=null;walkAll(deptId,n=>{if(n.id===id)f=n;});return f;}
function countLeaves(node){
  if(!node.children||!node.children.length)return 1;
  return node.children.reduce((a,c)=>a+countLeaves(c),0);
}
function countLeavesDone(node){
  if(!node.children||!node.children.length)return checks[node.id]?.done?1:0;
  return node.children.reduce((a,c)=>a+countLeavesDone(c),0);
}
function allLeaves(node){
  if(!node.children||!node.children.length)return[node];
  return node.children.flatMap(c=>allLeaves(c));
}

// ════════════════════════════════════════════════════════
//  DEPT SELECT
// ════════════════════════════════════════════════════════
function buildDS(){
  const sel=document.getElementById('deptSel');
  const cur=sel.value;
  sel.innerHTML='<option value="">-- 部署を選択 --</option>';
  depts.forEach(d=>{const o=document.createElement('option');o.value=d.id;o.textContent=d.name;sel.appendChild(o);});
  if(cur)sel.value=cur;
}
function onDept(){
  const v=document.getElementById('deptSel').value;
  curDept=v||null; selNodeId=null;
  localStorage.setItem('rc3_ld',v||'');
  renderSidebar(); updateStats(); showWelcome();
}

// ════════════════════════════════════════════════════════
//  SIDEBAR TREE
// ════════════════════════════════════════════════════════
function renderSidebar(){
  if(!curDept){document.getElementById('treeWrap').innerHTML='';updateStats();return;}
  const wrap=document.getElementById('treeWrap');
  wrap.innerHTML='';
  (nodes[curDept]||[]).forEach(n=>wrap.appendChild(buildTN(n,0)));
  updateStats();
}

function buildTN(node,depth){
  const leaves=countLeaves(node);
  const done=countLeavesDone(node);
  const isLeaf=!node.children||!node.children.length;
  const isOpen=expanded[node.id];
  const isSel=selNodeId===node.id;
  const dc=DEPTH_CLASS[node.type]||'d0';

  const div=document.createElement('div');
  div.className=`tn ${dc}${isSel?' sel':''}${isOpen?' open':''}`;
  div.id='tn_'+node.id;

  const addLabel={ws:'＋ トーク',talk:'＋ バリエーション',var:'＋ 切り返し',rebuttal:'＋ 切り返し'};
  const row=document.createElement('div');
  row.className='tn-row';
  row.innerHTML=`
    <span class="tn-chev">${isLeaf?'':' ▶'}</span>
    <span class="tn-icon">${ICONS[node.type]||'📄'}</span>
    <span class="tn-lbl">${esc(node.name)}</span>
    ${!isLeaf?`<span class="tn-cnt">${done}/${leaves}</span>`:''}
    ${done>0&&isLeaf?`<span class="tn-done">✓</span>`:''}
    <button class="tn-add" title="${addLabel[node.type]||'追加'}"
      onclick="event.stopPropagation();openModal('child','${node.id}')">＋</button>`;
  row.onclick=()=>selectNode(node.id);
  div.appendChild(row);

  if(!isLeaf){
    const ch=document.createElement('div');
    ch.className='tn-children'+(isOpen?'':' hid');
    (node.children||[]).forEach(c=>ch.appendChild(buildTN(c,depth+1)));
    div.appendChild(ch);
  }
  return div;
}

function selectNode(id){
  expanded[id]=!expanded[id];
  selNodeId=id;
  renderSidebar();
  renderMain(id);
}

// ════════════════════════════════════════════════════════
//  MAIN PANEL
// ════════════════════════════════════════════════════════
function showWelcome(){
  document.getElementById('breadcrumb').innerHTML='<span class="bc-i cur">ホーム</span>';
  document.getElementById('mainBody').innerHTML=`<div class="welcome">
    <div class="welcome-ic">🗂️</div>
    <div style="font-size:14px;font-weight:700;margin-bottom:6px">ワークスペースを選択してください</div>
    <div style="font-size:12px;color:var(--mu2)">左サイドバーのツリーからノードを選択してください</div>
  </div>`;
}

function renderMain(id){
  const node=findNode(curDept,id);
  if(!node)return;
  renderBreadcrumb(id);
  const body=document.getElementById('mainBody');
  const isLeaf=!node.children||!node.children.length;
  const leaves=allLeaves(node);
  const tc=TYPE_CLASS[node.type]||'nt0';
  const leavesCount=countLeaves(node);
  const doneCount=countLeavesDone(node);

  let html=`<div class="nhd">
    <div class="nhd-l">
      <span class="ntype ${tc}">${ICONS[node.type]} ${LABELS[node.type]||''}</span>
      <div>
        <div class="ntit">${esc(node.name)}</div>
        <div class="nsub">${esc(node.sub||'')} ${node.sub?'':''}</div>
      </div>
    </div>
    <div style="display:flex;gap:6px;flex-wrap:wrap">
      ${!isLeaf?`<button class="btn gr" onclick="markAllSub('${node.id}')">✅ 全完了</button>`:''}
      <button class="btn rd" onclick="deleteNode('${node.id}')">🗑 削除</button>
    </div>
  </div>`;

  // 子フォルダグリッド
  if(!isLeaf){
    html+=`<div class="ch-grid">`;
    (node.children||[]).forEach(c=>{
      const cl=countLeaves(c);const cd=countLeavesDone(c);const pct=cl?Math.round(cd/cl*100):0;
      html+=`<div class="ch-card" onclick="selectNode('${c.id}')">
        <div class="ch-ic">${ICONS[c.type]||'📄'}</div>
        <div class="ch-name">${esc(c.name)}</div>
        <div class="ch-prog">
          <div class="ch-prog-t"><div class="ch-prog-f" style="width:${pct}%"></div></div>
          <div class="ch-cnt">${cd}/${cl} 完了</div>
        </div>
      </div>`;
    });
    html+=`<div class="ch-card add" onclick="openModal('child','${node.id}')">
      <div style="font-size:20px">＋</div>
      <div style="font-size:11px;font-weight:700">${{ws:'トーク追加',talk:'バリエーション追加',var:'切り返し追加',rebuttal:'切り返し追加'}[node.type]||'追加'}</div>
    </div></div>`;
  }

  // 録音ファイルリスト（このノード自身 or 子の末端）
  const items = isLeaf ? [node] : leaves;
  if(items.length){
    html+=`<div style="font-size:11px;font-weight:700;color:var(--mu2);margin-bottom:8px">
      🎙️ 録音ファイル <span style="font-family:var(--mono);font-size:10px;background:var(--s3);padding:1px 6px;border-radius:3px;margin-left:4px">${doneCount}/${leavesCount}</span>
    </div>
    <div class="rec-list" id="recList">`;
    items.forEach(it=>{
      const s=checks[it.id]||{};const dn=!!s.done;
      const th=((it.tags||[]).map(t=>
        t==='unused'?'<span class="mt un">未使用</span>':
        t==='stopped'?'<span class="mt st">停止中</span>':'')).join('');
      const path=getPath(curDept,it.id);
      html+=`<div class="ri${dn?' dn':''}" id="ri_${it.id}">
        <div class="ri-main" onclick="tog('${it.id}')">
          <div class="cbx"><span class="ckm">✓</span></div>
          <div class="ri-body">
            <div class="ri-name">${esc(it.name)}</div>
            <div class="ri-path">${esc(path)}</div>
          </div>
          <div class="ri-r">${th}
            <div class="stmp">${s.doneAt?'✓ '+fmtDt(s.doneAt):''}</div>
          </div>
          <button class="exb" onclick="event.stopPropagation();exRI('${it.id}')">▼</button>
        </div>
        <div class="ri-det">
          <div class="dg">
            <div class="df"><label>担当者名</label>
              <input class="di" id="dp_${it.id}" value="${esc(s.person||'')}" placeholder="例: 田中"></div>
            <div class="df"><label>完了日時</label>
              <input class="di" id="dd_${it.id}" value="${s.doneAt?fmtDt(s.doneAt):''}" readonly placeholder="完了時に自動入力"></div>
          </div>
          <div class="df"><label>メモ・備考</label>
            <textarea class="di" id="dm_${it.id}" placeholder="特記事項・修正履歴など">${esc(s.memo||'')}</textarea></div>
          <div class="da">
            <button class="bsv" onclick="saveCI('${it.id}')">保存</button>
            <button class="bcl" onclick="clrCI('${it.id}')">リセット</button>
          </div>
        </div>
      </div>`;
    });
    html+=`</div>`;
  }

  // ログ
  const deptLogs=logs.filter(l=>l.dept===curDept&&l.nodeId&&
    (l.nodeId===id||items.some(it=>it.id===l.nodeId)));
  html+=`<div class="lsec"><div class="lhd">📋 このノードのログ</div>
    <div class="llist" id="nodeLog"></div></div>`;

  body.innerHTML=html;
  renderLL(document.getElementById('nodeLog'),deptLogs);
}

function renderBreadcrumb(id){
  const path=[];
  function findPath(nodes2,target){
    for(const n of nodes2){
      if(n.id===target){path.push(n);return true;}
      if(n.children&&findPath(n.children,target)){path.unshift(n);return true;}
    }
    return false;
  }
  const root=nodes[curDept]||[];
  root.forEach(n=>{if(!path.length)findPath([n],id);});
  // path is already in order from root to target
  let pathNodes=[];
  function fp(arr,tid){
    for(const n of arr){
      if(n.id===tid){pathNodes=[...pathNodes,n];return true;}
      pathNodes=[...pathNodes,n];
      if(n.children&&fp(n.children,tid))return true;
      pathNodes.pop();
    }
    return false;
  }
  pathNodes=[];fp(root,id);
  const bc=document.getElementById('breadcrumb');
  bc.innerHTML=`<span class="bc-i" onclick="showWelcome();selNodeId=null;renderSidebar()">ホーム</span>`;
  pathNodes.forEach((n,i)=>{
    bc.innerHTML+=`<span class="bc-sep">›</span>`;
    if(i===pathNodes.length-1)
      bc.innerHTML+=`<span class="bc-i cur">${esc(n.name)}</span>`;
    else
      bc.innerHTML+=`<span class="bc-i" onclick="selectNode('${n.id}')">${esc(n.name)}</span>`;
  });
}

function getPath(deptId,nodeId){
  let pathNodes=[];
  function fp(arr){
    for(const n of arr){
      pathNodes=[...pathNodes,n];
      if(n.id===nodeId)return true;
      if(n.children&&fp(n.children))return true;
      pathNodes.pop();
    }
    return false;
  }
  fp(nodes[deptId]||[]);
  return pathNodes.map(n=>n.name).join(' › ');
}

// ════════════════════════════════════════════════════════
//  STATS
// ════════════════════════════════════════════════════════
function updateStats(){
  if(!curDept){
    ['sDn','sTt','sRm'].forEach(id=>document.getElementById(id).textContent='—');
    document.getElementById('pf').style.width='0%';
    document.getElementById('pp').textContent='—';
    return;
  }
  let tot=0,dn=0;
  walkAll(curDept,n=>{
    if(!n.children||!n.children.length){tot++;if(checks[n.id]?.done)dn++;}
  });
  const rm=tot-dn,pct=tot?Math.round(dn/tot*100):0;
  document.getElementById('sDn').textContent=dn;
  document.getElementById('sTt').textContent=tot;
  document.getElementById('sRm').textContent=rm;
  document.getElementById('pf').style.width=pct+'%';
  document.getElementById('pp').textContent=tot?pct+'%':'—';
}

// ════════════════════════════════════════════════════════
//  CHECK ACTIONS
// ════════════════════════════════════════════════════════
async function tog(id){
  const s=checks[id]||{};const now=!s.done;
  checks[id]={...s,done:now,doneAt:now?new Date().toISOString():null};
  const node=findNode(curDept,id);
  aLog({action:now?'done':'undone',name:node?.name||id,nodeId:id,
    dept:curDept,deptName:depts.find(d=>d.id===curDept)?.name||'',person:s.person||''});
  await push();renderSidebar();if(selNodeId)renderMain(selNodeId);
  showT(now?`✓ 完了: ${node?.name}`:'↩ 未完了に戻しました','ok');
}
function exRI(id){document.getElementById('ri_'+id)?.classList.toggle('ex')}
async function saveCI(id){
  const s=checks[id]||{};
  checks[id]={...s,
    person:document.getElementById('dp_'+id)?.value.trim()||'',
    memo:document.getElementById('dm_'+id)?.value.trim()||''};
  const node=findNode(curDept,id);
  aLog({action:'saved',name:node?.name||id,nodeId:id,
    dept:curDept,deptName:depts.find(d=>d.id===curDept)?.name||'',person:checks[id].person});
  await push();if(selNodeId)renderMain(selNodeId);showT('💾 保存しました','ok');
}
async function clrCI(id){
  if(!confirm('この項目の記録をリセットしますか？'))return;
  const node=findNode(curDept,id);
  aLog({action:'cleared',name:node?.name||id,nodeId:id,
    dept:curDept,deptName:depts.find(d=>d.id===curDept)?.name||''});
  delete checks[id];
  await push();renderSidebar();if(selNodeId)renderMain(selNodeId);showT('🔄 リセットしました','info');
}
async function markAllSub(nodeId){
  if(!confirm('このノード以下の全録音ファイルを完了にしますか？'))return;
  const node=findNode(curDept,nodeId);if(!node)return;
  const now=new Date().toISOString();
  allLeaves(node).forEach(l=>{if(!checks[l.id]?.done)checks[l.id]={...(checks[l.id]||{}),done:true,doneAt:now};});
  aLog({action:'all_done',name:node.name,nodeId,dept:curDept,deptName:depts.find(d=>d.id===curDept)?.name||''});
  await push();renderSidebar();renderMain(selNodeId||nodeId);showT('✅ 全件完了にしました','ok');
}

// ════════════════════════════════════════════════════════
//  NODE CRUD
// ════════════════════════════════════════════════════════
let addMode=null,addParentId=null;
function openModal(mode,parentId){
  addMode=mode;addParentId=parentId||null;
  const mo=document.getElementById('addMot');
  const ms=document.getElementById('addMos');
  const inp=document.getElementById('addInp');
  document.getElementById('addSub').value='';
  document.getElementById('addTag').value='';
  if(mode==='ws'){mo.textContent='ワークスペースを追加';ms.textContent='商材名を入力してください';inp.placeholder='例: NURO光 / au光';}
  else{
    const parent=findNode(curDept,parentId);
    const ct={ws:'トーク',talk:'バリエーション',var:'切り返し',rebuttal:'切り返し'}[parent?.type]||'ノード';
    mo.textContent=ct+'を追加';ms.textContent=`「${parent?.name}」の中に追加します`;inp.placeholder=ct+'名';
  }
  inp.value='';
  document.getElementById('addModal').classList.remove('hid');
  setTimeout(()=>inp.focus(),60);
}
function closeAddModal(){document.getElementById('addModal').classList.add('hid');}
async function confirmAdd(){
  const name=document.getElementById('addInp').value.trim();
  if(!name)return;
  const sub=document.getElementById('addSub').value.trim();
  const tagStr=document.getElementById('addTag').value.trim();
  const tags=tagStr?tagStr.split(',').map(t=>t.trim()).filter(Boolean):[];
  if(addMode==='ws'){
    if(!curDept){showT('部署を選択してください','err');return;}
    const id='n'+Date.now();
    if(!nodes[curDept])nodes[curDept]=[];
    nodes[curDept].push({id,type:'ws',name,sub,tags,children:[]});
  } else {
    const parent=findNode(curDept,addParentId);if(!parent)return;
    const type=CHILD_TYPE[parent.type]||'rebuttal';
    if(!parent.children)parent.children=[];
    parent.children.push({id:'n'+Date.now(),type,name,sub,tags,children:[]});
  }
  await push();renderSidebar();closeAddModal();showT(`「${name}」を追加しました`,'ok');
}
document.getElementById('addInp').addEventListener('keydown',e=>{if(e.key==='Enter')confirmAdd();});

async function deleteNode(id){
  const node=findNode(curDept,id);
  if(!confirm(`「${node?.name}」とその中のデータを削除しますか？`))return;
  function removeFrom(arr){
    const i=arr.findIndex(n=>n.id===id);
    if(i>=0){arr.splice(i,1);return true;}
    return arr.some(n=>n.children&&removeFrom(n.children));
  }
  removeFrom(nodes[curDept]||[]);
  // 配下のchecksも削除
  if(node)allLeaves(node).forEach(l=>delete checks[l.id]);
  selNodeId=null;
  await push();renderSidebar();showWelcome();showT('削除しました','info');
}

// ════════════════════════════════════════════════════════
//  LOG
// ════════════════════════════════════════════════════════
const AM={done:'✅ 完了',undone:'↩ 未完了に戻した',saved:'💾 保存',cleared:'🗑 リセット',all_done:'✅ 全完了',dept_reset:'🔄 リセット'};
function renderLL(el,items){
  if(!items?.length){el.innerHTML='<div class="le">まだ記録がありません</div>';return;}
  el.innerHTML=[...items].reverse().map(l=>`
    <div class="li">
      <span class="lts">${fmtDt(l.ts)}</span>
      <span class="lb"><span class="ln">${esc(l.name)}</span> を <strong>${AM[l.action]||l.action}</strong>
        ${l.person?` — 担当: <strong>${esc(l.person)}</strong>`:''}</span>
      <span class="ldp">${esc(l.deptName||l.dept||'')}</span>
    </div>`).join('');
}
function aLog(e){logs.push({...e,ts:new Date().toISOString()});if(logs.length>400)logs=logs.slice(-400);}

// ════════════════════════════════════════════════════════
//  ADMIN
// ════════════════════════════════════════════════════════
function openAdmin(){
  renderAD();buildANodeSel();renderNodeAdmin();
  document.getElementById('adminModal').classList.remove('hid');
}
function closeAdmin(){document.getElementById('adminModal').classList.add('hid');}
function swAT(id,btn){
  document.querySelectorAll('.at').forEach(b=>b.classList.remove('on'));
  document.querySelectorAll('.as').forEach(s=>s.classList.remove('on'));
  btn.classList.add('on');document.getElementById('as-'+id).classList.add('on');
}
function renderAD(){
  document.getElementById('adList').innerHTML=depts.map(d=>`
    <div class="mrow">
      <input class="mi" value="${esc(d.name)}" id="adni_${d.id}">
      <input type="color" class="mc" value="${d.color||'#4f7cff'}" id="adci_${d.id}">
      <button class="btn rd" style="font-size:10px;padding:4px 9px" onclick="delDept('${d.id}')">削除</button>
    </div>`).join('');
}
function addDept(){
  const n=document.getElementById('ndn').value.trim();if(!n)return;
  const id='d'+Date.now();depts.push({id,name:n,color:'#4f7cff'});nodes[id]=[];
  document.getElementById('ndn').value='';buildDS();renderAD();buildANodeSel();showT(`部署「${n}」を追加しました`,'ok');
}
function delDept(id){
  const d=depts.find(x=>x.id===id);
  if(!confirm(`部署「${d?.name}」と全データを削除しますか？`))return;
  depts=depts.filter(x=>x.id!==id);delete nodes[id];
  if(curDept===id){curDept=null;document.getElementById('deptSel').value='';}
  buildDS();renderAD();buildANodeSel();showT('削除しました','info');
}
function buildANodeSel(){
  const sel=document.getElementById('ndeptSel');
  sel.innerHTML=depts.map(d=>`<option value="${d.id}">${esc(d.name)}</option>`).join('');
  if(curDept)sel.value=curDept;
  renderNodeAdmin();
}
function renderNodeAdmin(){
  const did=document.getElementById('ndeptSel').value;
  const el=document.getElementById('neTree');
  el.innerHTML='';
  (nodes[did]||[]).forEach(n=>el.appendChild(buildNE(n,did)));
}
function buildNE(node,deptId,parentArr){
  const div=document.createElement('div');
  div.className='ne-node';
  div.innerHTML=`<div class="ne-hd">
    <span class="ne-ic">${ICONS[node.type]||'📄'}</span>
    <input class="ne-ni" value="${esc(node.name)}" id="nni_${node.id}" placeholder="ノード名">
    <input class="ne-tag" value="${esc((node.tags||[]).join(','))}" id="nti_${node.id}" placeholder="タグ">
    <button class="btn rd" style="font-size:10px;padding:3px 8px" onclick="delNodeAdmin('${deptId}','${node.id}')">✕</button>
  </div>
  <input class="ne-sub" value="${esc(node.sub||'')}" id="nsi_${node.id}" placeholder="説明（任意）">
  <div class="ne-children" id="nc_${node.id}"></div>`;
  if(node.children?.length){
    const ch=div.querySelector('#nc_'+node.id);
    node.children.forEach(c=>ch.appendChild(buildNE(c,deptId)));
  }
  return div;
}
function delNodeAdmin(deptId,id){
  if(!confirm('このノードを削除しますか？'))return;
  function rm(arr){const i=arr.findIndex(n=>n.id===id);if(i>=0){arr.splice(i,1);return true;}return arr.some(n=>n.children&&rm(n.children));}
  rm(nodes[deptId]||[]);renderNodeAdmin();
}
async function resetDept(){
  const did=document.getElementById('ndeptSel').value;
  const d=depts.find(x=>x.id===did);
  if(!confirm(`「${d?.name}」のチェック記録を全てリセットしますか？`))return;
  walkAll(did,n=>{if(!n.children||!n.children.length)delete checks[n.id];});
  aLog({action:'dept_reset',name:d?.name||did,nodeId:'',dept:did,deptName:d?.name||''});
  await push();renderSidebar();if(selNodeId)renderMain(selNodeId);showT('リセットしました','info');
}
async function saveAdmin(){
  // 部署名・カラー
  depts.forEach(d=>{
    const ni=document.getElementById('adni_'+d.id);const ci=document.getElementById('adci_'+d.id);
    if(ni)d.name=ni.value.trim()||d.name;if(ci)d.color=ci.value;
  });
  // ノード名・説明・タグ
  Object.keys(nodes).forEach(did=>{
    walkAll(did,n=>{
      const ni=document.getElementById('nni_'+n.id);const si=document.getElementById('nsi_'+n.id);const ti=document.getElementById('nti_'+n.id);
      if(ni)n.name=ni.value.trim()||n.name;if(si)n.sub=si.value.trim();
      if(ti)n.tags=ti.value?ti.value.split(',').map(t=>t.trim()).filter(Boolean):[];
    });
  });
  await push();buildDS();renderSidebar();closeAdmin();showT('💾 設定を保存しました','ok');
}

// ════════════════════════════════════════════════════════
//  IMPORT / EXPORT
// ════════════════════════════════════════════════════════
function exportData(){
  const blob=new Blob([JSON.stringify({version:3,exported:new Date().toISOString(),
    depts,nodes,checks,logs:logs.slice(-400)},null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`録音作業記録_${new Date().toLocaleDateString('ja-JP').replace(/\//g,'-')}.json`;
  a.click();showT('📤 エクスポートしました','info');
}
function openImport(){document.getElementById('importModal').classList.remove('hid');}
function closeImport(){document.getElementById('importModal').classList.add('hid');}
async function doImport(){
  try{
    const d=JSON.parse(document.getElementById('impArea').value.trim());
    if(d.depts)depts=d.depts;if(d.nodes)nodes=d.nodes;
    if(d.checks)checks=d.checks;if(d.logs)logs=d.logs;
    await push();buildDS();renderSidebar();closeImport();showT('📥 インポート完了','ok');
  }catch(e){showT('JSONの形式が正しくありません: '+e.message,'err');}
}

// ════════════════════════════════════════════════════════
//  HELPERS
// ════════════════════════════════════════════════════════
function fmtDt(iso){if(!iso)return'';const d=new Date(iso);return d.toLocaleDateString('ja-JP')+' '+d.toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'});}
function fmtNow(){return fmtDt(new Date().toISOString())}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
let _tt;
function showT(m,t='ok'){const el=document.getElementById('toast');el.textContent=m;el.className='toast '+t;clearTimeout(_tt);setTimeout(()=>el.classList.add('show'),10);_tt=setTimeout(()=>el.classList.remove('show'),3000);}

// overlay click close
['adminModal','addModal','importModal'].forEach(id=>{
  document.getElementById(id).addEventListener('click',e=>{
    if(e.target===document.getElementById(id))document.getElementById(id).classList.add('hid');
  });
});

init();
</script>
